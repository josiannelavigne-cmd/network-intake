<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Centrak — Network Intake</title>
  <style>
    @font-face { font-family: 'Satoshi'; src: url('./Satoshi/Satoshi-Regular.otf') format('opentype'); font-weight: 400; font-style: normal; }
    @font-face { font-family: 'Satoshi'; src: url('./Satoshi/Satoshi-Medium.otf') format('opentype'); font-weight: 500; font-style: normal; }
    @font-face { font-family: 'Satoshi'; src: url('./Satoshi/Satoshi-Bold.otf') format('opentype'); font-weight: 700; font-style: normal; }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Satoshi', Arial, sans-serif;
      background: #00549A;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 48px 40px;
      width: 100%;
      max-width: 380px;
    }

    .logo {
      font-weight: 700;
      font-size: 20px;
      color: #00549A;
      letter-spacing: -0.3px;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 13px;
      color: rgba(17, 17, 17, 0.50);
      margin-bottom: 36px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #1B2332;
      margin-bottom: 6px;
    }

    input[type="password"] {
      width: 100%;
      height: 40px;
      padding: 0 12px;
      border: 1px solid #D9D9D9;
      border-radius: 6px;
      font-family: 'Satoshi', Arial, sans-serif;
      font-size: 14px;
      color: #1B2332;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="password"]:focus {
      border-color: #00549A;
    }

    .error {
      font-size: 12px;
      color: #D32F2F;
      margin-top: 6px;
      min-height: 16px;
    }

    button {
      margin-top: 24px;
      width: 100%;
      height: 42px;
      background: #00549A;
      color: #fff;
      border: none;
      border-radius: 64px;
      font-family: 'Satoshi', Arial, sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover { background: #003778; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Centrak</div>
    <div class="subtitle">Network Intake — Design Prototype</div>

    <label for="password">Password</label>
    <input type="password" id="password" placeholder="Enter password" autofocus />
    <div class="error" id="error"></div>

    <button onclick="login()">View prototype</button>
  </div>

  <script>
    document.getElementById('password').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') login();
    });

    function login() {
      const val = document.getElementById('password').value;
      if (val === 'Be22_design') {
        window.location.href = './centrak-intake-pass1.html';
      } else {
        document.getElementById('error').textContent = 'Incorrect password. Try again.';
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
      }
    }
  </script>
</body>
</html>
